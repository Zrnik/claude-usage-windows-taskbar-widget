name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: >
          dotnet publish ClaudeUsageWidget
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}

      - name: Rename artifact
        run: mv publish/${{ matrix.rid }}/ClaudeUsageWidget.exe publish/${{ matrix.rid }}/ClaudeUsageWidget-${{ matrix.rid }}.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/${{ matrix.rid }}/ClaudeUsageWidget-${{ matrix.rid }}.exe
          token: ${{ secrets.GITHUB_TOKEN }}
